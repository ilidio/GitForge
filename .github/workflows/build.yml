name: Build and Package GitForge

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: linux
            dotnet_rid: linux-x64
          - os: ubuntu-latest
            arch: arm64
            target: linux
            dotnet_rid: linux-arm64
          - os: windows-latest
            arch: x64
            target: win
            dotnet_rid: win-x64
          - os: windows-latest
            arch: arm64
            target: win
            dotnet_rid: win-arm64
          - os: windows-latest
            arch: ia32
            target: win
            dotnet_rid: win-x86
          - os: macos-latest
            arch: x64
            target: mac
            dotnet_rid: osx-x64
          - os: macos-latest
            arch: arm64
            target: mac
            dotnet_rid: osx-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: gitforge-client/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Dependencies
        working-directory: gitforge-client
        run: npm install --legacy-peer-deps

      - name: Run Frontend Tests
        working-directory: gitforge-client
        run: npm run test

      - name: Run Backend Tests
        run: dotnet test GitForge.sln --verbosity normal

      - name: Build .NET Server Sidecar
        shell: bash
        run: |
          mkdir -p gitforge-client/server-dist/${{ matrix.target }}/${{ matrix.arch }}
          dotnet publish gitforge-server/GitForge.Server.csproj \
            -c Release \
            -r ${{ matrix.dotnet_rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            -o gitforge-client/server-dist/${{ matrix.target }}/${{ matrix.arch }}

      - name: Build Next.js Frontend
        working-directory: gitforge-client
        run: npm run build

      - name: Package with Electron Builder
        working-directory: gitforge-client
        shell: bash
        run: |
          PUBLISH_FLAG="never"
          if [[ "${{ github.event_name }}" == "release" || "${{ github.ref }}" == refs/tags/* ]]; then
            PUBLISH_FLAG="always"
          fi
          npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish $PUBLISH_FLAG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gitforge-${{ matrix.target }}-${{ matrix.arch }}
          path: gitforge-client/dist/*
          if-no-files-found: error
